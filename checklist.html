<style>
:root {

* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:#e2f0ff; font-family:'Noto Sans KR',sans-serif; min-height:100vh; padding:70px 16px 60px; }

.home-btn {

h1 { font-family:'Orbitron'; font-size:1.2rem; color:var(--neon); text-shadow:0 0 15px var(--neon); letter-spacing:4px; text-align:center; margin-bottom:6px; }
.subtitle { text-align:center; font-family:'Share Tech Mono'; font-size:0.7rem; color:rgba(0,255,204,0.4); letter-spacing:2px; margin-bottom:24px; }

/* 전체 진행률 */
.total-progress { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px 20px; margin-bottom:20px; }
.progress-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.progress-title { font-family:'Orbitron'; font-size:0.7rem; color:var(--muted); letter-spacing:2px; color:rgba(0,255,204,0.5); }
.progress-pct { font-family:'Orbitron'; font-size:1.4rem; font-weight:900; color:var(--neon); }
.progress-bar-wrap { background:rgba(0,255,204,0.08); border-radius:20px; height:10px; overflow:hidden; }
.progress-bar { height:100%; border-radius:20px; background:linear-gradient(90deg,var(--neon),var(--neon2)); transition:width 0.4s ease; box-shadow:0 0 10px rgba(0,255,204,0.5); }
.progress-sub { margin-top:8px; font-size:0.72rem; color:rgba(226,240,255,0.4); font-family:'Share Tech Mono'; }

/* Phase 섹션 */
.phase { background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:14px; overflow:hidden; }
.phase-header { padding:14px 18px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:background 0.2s; }
.phase-header:hover { background:rgba(0,255,204,0.04); }
.phase-badge { font-family:'Orbitron'; font-size:0.6rem; font-weight:700; padding:3px 10px; border-radius:20px; letter-spacing:1px; white-space:nowrap; border:1px solid; }
.phase-badge.todo  { color:rgba(226,240,255,0.4); border-color:rgba(226,240,255,0.15); background:transparent; }
.phase-badge.doing { color:var(--gold); border-color:rgba(255,200,60,0.4); background:rgba(255,200,60,0.08); }
.phase-badge.done  { color:var(--neon); border-color:rgba(0,255,204,0.4); background:rgba(0,255,204,0.08); }
.phase-title { font-size:0.88rem; font-weight:700; flex:1; }
.phase-progress-mini { font-family:'Share Tech Mono'; font-size:0.68rem; color:rgba(0,255,204,0.45); white-space:nowrap; }
.phase-arrow { font-size:0.7rem; color:rgba(0,255,204,0.3); transition:transform 0.2s; }
.phase-arrow.open { transform:rotate(90deg); }

.phase-body { padding:0 18px 14px; display:none; }
.phase-body.open { display:block; }

/* 카테고리 */
.category { margin-bottom:12px; }
.cat-label { font-family:'Share Tech Mono'; font-size:0.65rem; color:rgba(0,255,204,0.35); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; padding-left:4px; border-left:2px solid rgba(0,255,204,0.2); padding-left:8px; }

/* 체크 아이템 */

.check-item:hover { background:rgba(0,255,204,0.04); border-color:rgba(0,255,204,0.1); }
.check-item.checked { opacity:0.55; }
.check-box { width:18px; height:18px; border-radius:4px; border:1.5px solid rgba(0,255,204,0.3); background:transparent; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-size:11px; }

.tag-setup  { color:var(--gold); border:1px solid rgba(255,200,60,0.3); background:rgba(255,200,60,0.06); }

// 저장된 체크 상태 로드
function loadChecked() {
  try { return JSON.parse(localStorage.getItem('nana_checklist') || '{}'); }
  catch { return {}; }
}
function saveChecked(state) {
  localStorage.setItem('nana_checklist', JSON.stringify(state));
}

let checked = loadChecked();

function getAllItems() {
  let all = [];
  DATA.forEach(phase => phase.items.forEach(cat => cat.items.forEach(item => all.push(item.id))));
  return all;
}

function updateProgress() {
  const all = getAllItems();
  const done = all.filter(id => checked[id]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('total-pct').textContent = pct + '%';
  document.getElementById('total-bar').style.width = pct + '%';
  document.getElementById('total-sub').textContent = `${done} / ${all.length} 완료`;

  // 각 phase 진행률 업데이트
  DATA.forEach(phase => {
    let phaseItems = [];
    phase.items.forEach(cat => cat.items.forEach(item => phaseItems.push(item.id)));
    const pDone = phaseItems.filter(id => checked[id]).length;
    const pPct = phaseItems.length ? Math.round(pDone / phaseItems.length * 100) : 0;
    const el = document.getElementById('mini-' + phase.id);
    if (el) el.textContent = `${pDone}/${phaseItems.length}`;

    // badge 상태
    const badge = document.getElementById('badge-' + phase.id);
    if (badge) {
      if (pDone === 0) { badge.className = 'phase-badge todo'; badge.textContent = phase.badge; }
      else if (pDone === phaseItems.length) { badge.className = 'phase-badge done'; badge.textContent = '✓ ' + phase.badge; }
      else { badge.className = 'phase-badge doing'; badge.textContent = '▶ ' + phase.badge; }
    }
  });
}

function toggle(id) {

  saveChecked(checked);
  const el = document.getElementById('ci-' + id);
  if (el) {
    el.classList.toggle('checked', checked[id]);
    el.querySelector('.check-box').textContent = checked[id] ? '✓' : '';
  }
  updateProgress();
}

function togglePhase(id) {
  const body = document.getElementById('body-' + id);
  const arrow = document.getElementById('arrow-' + id);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function resetAll() {
  if (!confirm('전체 초기화할까요?')) return;
  checked = {};
  saveChecked(checked);
  document.querySelectorAll('.check-item').forEach(el => {
    el.classList.remove('checked');
    el.querySelector('.check-box').textContent = '';
  });
  updateProgress();
}

const tagClass = { file:'tag-file', setup:'tag-setup', code:'tag-code', test:'tag-test', server:'tag-server' };
const tagLabel = { file:'FILE', setup:'SETUP', code:'CODE', test:'TEST', server:'SERVER' };

function render() {
  const container = document.getElementById('checklist');
  container.innerHTML = DATA.map(phase => {
    const cats = phase.items.map(cat => `
      <div class="category">
        <div class="cat-label">${cat.cat}</div>
        ${cat.items.map(item => `
          <div class="check-item${checked[item.id] ? ' checked' : ''}" id="ci-${item.id}" onclick="toggle('${item.id}')">
            <div class="check-box">${checked[item.id] ? '✓' : ''}</div>
            <div class="check-text">${item.text}</div>
            <span class="check-tag ${tagClass[item.tag]}">${tagLabel[item.tag]}</span>
          </div>
        `).join('')}
      </div>
    `).join('');

    return `
      <div class="phase">
        <div class="phase-header" onclick="togglePhase('${phase.id}')">
          <span class="phase-badge todo" id="badge-${phase.id}">${phase.badge}</span>
          <span class="phase-title">${phase.phase}${phase.period ? ` <span style="font-size:0.72rem;color:rgba(0,255,204,0.35);font-family:'Share Tech Mono'">${phase.period}</span>` : ''}</span>
          <span class="phase-progress-mini" id="mini-${phase.id}">0/0</span>
          <span class="phase-arrow" id="arrow-${phase.id}">▶</span>
        </div>
        <div class="phase-body" id="body-${phase.id}">
          ${cats}
        </div>
      </div>
    `;
  }).join('');

  updateProgress();
}

render();
</script>
</body>
</html>
